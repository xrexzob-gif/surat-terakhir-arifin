<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XREXZOB // SOLITUDE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

        body {
            background-color: #050505;
            color: #999;
            font-family: 'Crimson Text', serif;
            display: flex;
            flex-direction: column;
            padding: 50px 25px 300px 25px;
            line-height: 1.8;
            margin: 0;
            overflow-x: hidden;
        }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            color: #444; cursor: pointer; letter-spacing: 3px; font-size: 0.9rem;
        }

        #typing-area {
            max-width: 600px;
            margin: 0 auto;
            white-space: pre-wrap; /* Biar spasi dan baris baru rapi */
            font-size: 1.2rem;
            font-style: italic;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2rem;
            background: #444;
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body onclick="startTyping()">

    <div id="overlay">KETUK UNTUK MASUK KE RUANG SUNYI</div>

    <audio id="lagu" loop>
        <source src="sedih.mp3" type="audio/mpeg">
    </audio>

    <div id="typing-area"></div><span class="cursor" id="cursor" style="display:none;"></span>

    <script>
        const text = `XREXZOB...

Ibu, kalau saja waktu bisa diputar kembali, aku hanya ingin meminta satu hal: satu hari lagi untuk bisa benar-benar mengingat wajahmu tanpa harus melihat foto. Aku lahir ke dunia ini pada 8 Agustus 2005, membawa harapan yang mungkin dulu Ibu gantungkan di pundak kecilku. Tapi takdir berkata lain. Baru saja aku belajar memanggil namamu, baru saja aku belajar melangkah dengan tanganmu sebagai pegangan, di usia 2 tahun kita harus dipisahkan oleh jarak yang paling jauh—antara dunia dan keabadian. Kini, 19 tahun telah berlalu, dan aku tumbuh besar di tengah riuhnya dunia tanpa pernah lagi mendengar bisikan doa langsung dari bibirmu.
​Ibu, aku ingin jujur pada dunia dan pada Ibu di sana. Aku tumbuh menjadi anak yang tidak sempurna. Banyak orang yang mengenalku sebagai sosok yang nakal, keras kepala, dan mungkin seringkali melompati batas-batas aturan. Aku sadar sifatku sering bikin pusing, jalanku sering berbelok ke arah yang salah, dan mungkin aku pernah menjadi beban bagi orang-orang di sekitarku. Tapi tahukah Ibu? Di balik semua kenakalan itu, ada seorang anak kecil yang sebenarnya hanya sedang merasa kehilangan arah. Aku nakal karena aku tidak tahu bagaimana cara berdamai dengan rasa iri saat melihat orang lain memiliki tempat untuk pulang. Aku memberontak karena itu adalah satu-satunya cara aku mengekspresikan rasa sakit yang tidak bisa aku terjemahkan dengan kata-kata. Aku merasa dunia ini tidak adil karena harus merenggut Ibu terlalu cepat dari hidupku.
​Namun, di tengah segala badai yang aku ciptakan sendiri, Tuhan ternyata tidak membiarkan aku hancur sendirian. Di saat aku merasa tidak ada lagi orang yang mau bertahan dengan sifat burukku, Tuhan menghadirkan seseorang yang luar biasa di sampingku. Dia, pasanganku saat ini, adalah sosok yang luar biasa sabar menghadapi egoku. Dia yang tetap menggenggam tanganku saat aku merasa tidak layak untuk dicintai. Dia yang mendengarkan keluh kesahku, memahami segala trauma masa kecilku, dan tetap memilih untuk menetap meskipun dia tahu betapa berantakannya aku di dalam. Lewat dia, aku belajar kalau cinta itu bisa menyembuhkan, dan lewat dia pula, aku merasa seolah-olah Ibu sedang menitipkan pesan dari surga bahwa aku tetap pantas untuk bahagia.
​Maafkan aku ya, Bu, kalau selama ini aku belum bisa jadi anak yang bisa Ibu banggakan di depan para malaikat. Maaf kalau namaku lebih sering terdengar karena kenakalanku daripada prestasiku. Tapi lewat halaman digital ini, aku ingin bersaksi pada Ibu dan pada semesta, bahwa aku lelah menjadi anak yang nakal. Aku ingin mulai belajar menjadi laki-laki yang lebih baik. Aku ingin berubah, bukan karena ingin dipuji orang lain, tapi karena aku ingin menghormati setiap tetes darah dan air mata yang Ibu korbankan saat melahirkanku dulu. Aku ingin menjadi sosok yang bisa melindungi pasanganku dengan baik, sebagaimana seharusnya seorang laki-laki bersikap.
​Ibu adalah cinta pertamaku yang tak sempat terbalas, dan dia adalah cinta terakhirku yang akan terus aku perjuangkan. Terima kasih, Bu, sudah memberiku nyawa dan kesempatan untuk melihat dunia yang luas ini, meskipun Ibu tidak bisa mendampingiku melihat hasilnya. Ibu tenang ya di sana, di tempat yang paling indah di sisi Tuhan. Doaku mungkin tidak terdengar keras, tapi setiap malam aku selalu menyelipkan namamu dalam setiap heningku. Aku akan berusaha tegak berdiri, melawan sifat burukku, dan membuktikan kalau anak yang Ibu tinggalkan di usia 2 tahun ini bisa jadi pemenang pada akhirnya. Aku sayang Ibu, kemarin, sekarang, dan sampai kita bertemu lagi di keabadian nanti. Al-Fatihah."
Ini adalah akhir dari ceritaku hari ini. Tapi sunyi ini? Ia akan tetap di sini. Menungguku di setiap malam yang panjang.

Terima kasih karena sudah bersedia mendengarkan, meskipun kau hanya membacanya lewat layar yang dingin.

-- XREXZOB // 2026 --`;

        let i = 0;
        let speed = 70; // Kecepatan ngetik (semakin besar semakin lambat)
        let started = false;

        function startTyping() {
            if (started) return;
            started = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('cursor').style.display = 'inline-block';
            document.getElementById('lagu').play();
            typeWriter();
        }

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing-area").innerHTML += text.charAt(i);
                i++;
                
                // Variasi kecepatan biar kayak orang ngetik beneran
                let dynamicSpeed = speed;
                if (text.charAt(i-1) === "." || text.charAt(i-1) === "?") dynamicSpeed = 800; // Jeda lama di titik/tanya
                if (text.charAt(i-1) === "\n") dynamicSpeed = 1000; // Jeda sangat lama di baris baru

                setTimeout(typeWriter, dynamicSpeed);
                
                // Auto scroll ke bawah otomatis
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            } else {
                document.getElementById('cursor').style.animation = 'none';
                document.getElementById('cursor').style.opacity = '0';
            }
        }
    </script>
</body>
</html>
